<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="theme-color" content="#1a1a2e">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-title" content="Oficina Pesca">
<title>{% block title %}Oficina de Pesca{% endblock %}</title>
<link rel="icon" type="image/x-icon" href="/static/favicon.ico">
<link rel="manifest" href="/manifest.webmanifest">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
<link rel="stylesheet" href="/static/style.css">
</head>
<body>

<!-- Navbar -->
<nav class="navbar navbar-dark navbar-expand-md sticky-top ofp-navbar">
  <div class="container-fluid">
    <a class="navbar-brand fw-bold" href="/web/dashboard">
      <i class="bi bi-fish"></i> Oficina de Pesca
    </a>
    <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navMenu">
      <span class="navbar-toggler-icon"></span>
    </button>
    <div class="collapse navbar-collapse" id="navMenu">
      <ul class="navbar-nav me-auto">
        <li class="nav-item">
          <a class="nav-link {% if request.url.path == '/web/dashboard' %}active{% endif %}"
             href="/web/dashboard"><i class="bi bi-speedometer2"></i> Dashboard</a>
        </li>
        <li class="nav-item">
          <a class="nav-link {% if '/web/os' in request.url.path %}active{% endif %}"
             href="/web/os"><i class="bi bi-clipboard2-check"></i> Ordens de Serviço</a>
        </li>
        <li class="nav-item">
          <a class="nav-link {% if '/web/clientes' in request.url.path %}active{% endif %}"
             href="/web/clientes"><i class="bi bi-people"></i> Clientes</a>
        </li>
        <li class="nav-item">
          <a class="nav-link {% if '/web/financeiro' in request.url.path %}active{% endif %}"
             href="/web/financeiro"><i class="bi bi-cash-coin"></i> Financeiro</a>
        </li>
      </ul>
      <ul class="navbar-nav ms-auto align-items-center">
        <li class="nav-item me-2">
          <span class="badge ofp-badge-role">
            <i class="bi bi-person-circle"></i>
            {{ usuario|upper }} &nbsp;·&nbsp; {{ role }}
          </span>
        </li>
        <li class="nav-item">
          <a class="nav-link" href="/web/logout"><i class="bi bi-box-arrow-right"></i> Sair</a>
        </li>
      </ul>
    </div>
  </div>
</nav>

<!-- Conteúdo -->
<main class="container-fluid py-3 px-3 px-md-4">
  {% block content %}{% endblock %}
</main>

<!-- Footer -->
<footer class="ofp-footer text-center py-2">
  <small class="text-muted">Oficina de Pesca &nbsp;·&nbsp; v{{ versao if versao is defined else "" }}</small>
</footer>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script>
if ("serviceWorker" in navigator) {
  window.addEventListener("load", function () {
    navigator.serviceWorker.register("/sw.js").catch(function () {});
  });
}
</script>
{% block scripts %}{% endblock %}
</body>
</html>
