<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="theme-color" content="#1a1a2e">
<title>Login — Oficina de Pesca</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
<link rel="stylesheet" href="/static/style.css">
<style>
  body { background: #0f1923; min-height: 100vh; display: flex; align-items: center; justify-content: center; }
  .login-card { background: #1a2535; border-radius: 20px; padding: 2.5rem 2rem; width: 100%; max-width: 420px; box-shadow: 0 8px 32px rgba(0,0,0,0.5); }
  .login-logo { font-size: 3rem; color: #f39c12; }
  .login-title { color: #f39c12; font-weight: 700; font-size: 1.6rem; }
  .form-control { background: #0f1923; color: #ecf0f1; border: 1px solid #2c3e50; }
  .form-control:focus { background: #0f1923; color: #fff; border-color: #27ae60; box-shadow: 0 0 0 2px rgba(39,174,96,.3); }
  .form-control::placeholder { color: #7f8c8d; }
  .btn-entrar { background: #27ae60; border: none; font-weight: bold; font-size: 1.05rem; letter-spacing: .03em; }
  .btn-entrar:hover { background: #2ecc71; }
</style>
</head>
<body>
<div class="login-card">
  <div class="text-center mb-4">
    <div class="login-logo"><i class="bi bi-fish"></i></div>
    <p class="login-title mt-1">OFICINA DE PESCA</p>
    <p class="text-muted small">Acesse o sistema para gerenciar ordens e finanças</p>
  </div>

  {% if erro %}
  <div class="alert alert-danger py-2 text-center" role="alert">
    <i class="bi bi-exclamation-triangle-fill"></i> {{ erro }}
  </div>
  {% endif %}

  <form method="POST" action="/web/login" autocomplete="off">
    <div class="mb-3">
      <label class="form-label text-light small fw-bold">USUÁRIO</label>
      <input type="text" name="usuario" class="form-control form-control-lg"
             placeholder="Digite seu usuário" required autofocus>
    </div>
    <div class="mb-4">
      <label class="form-label text-light small fw-bold">SENHA</label>
      <div class="input-group">
        <input type="password" name="senha" id="senhaInput"
               class="form-control form-control-lg" placeholder="Digite sua senha" required>
        <button class="btn btn-secondary" type="button" onclick="toggleSenha()">
          <i class="bi bi-eye" id="senhaIcon"></i>
        </button>
      </div>
    </div>
    <button type="submit" class="btn btn-entrar btn-lg w-100">
      <i class="bi bi-lock-fill"></i> ENTRAR
    </button>
  </form>

  <p class="text-center text-muted mt-4 small">
    <i class="bi bi-info-circle"></i>
    Somente usuários cadastrados pelo ADMIN têm acesso.
  </p>
</div>
<script>
function toggleSenha() {
  const i = document.getElementById('senhaInput');
  const ic = document.getElementById('senhaIcon');
  if (i.type === 'password') { i.type = 'text'; ic.className = 'bi bi-eye-slash'; }
  else { i.type = 'password'; ic.className = 'bi bi-eye'; }
}
</script>
</body>
</html>
