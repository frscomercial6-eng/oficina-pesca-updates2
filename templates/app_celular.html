<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Oficina Pesca - App Celular</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background: #f5f6fa;
            margin: 0;
            padding: 0;
            color: #222;
        }
        .container {
            max-width: 420px;
            margin: 0 auto;
            padding: 24px 12px 48px 12px;
        }
        h1 {
            color: #2980b9;
            font-size: 2rem;
            margin-bottom: 12px;
        }
        .logo {
            width: 120px;
            margin: 0 auto 18px auto;
            display: block;
        }
        .btn {
            display: block;
            width: 100%;
            background: #27ae60;
            color: #fff;
            border: none;
            border-radius: 6px;
            padding: 16px;
            font-size: 1.2rem;
            margin: 18px 0 0 0;
            cursor: pointer;
            transition: background 0.2s;
        }
        .btn:hover {
            background: #219150;
        }
        .info {
            margin-top: 18px;
            color: #555;
            font-size: 1rem;
            text-align: center;
        }
    </style>
</head>
<body>
    <div class="container">
        <img src="/static/logo.png" alt="Logo Oficina" class="logo" onerror="this.style.display='none'">
        <h1>Oficina Pesca</h1>
        <button class="btn" onclick="window.location.href='/web/login'">Acessar Sistema</button>
        <div class="info">
            <p>Bem-vindo ao app da Oficina Pesca!<br>Use o botão acima para acessar o sistema pelo celular.</p>
        </div>
    </div>
</body>
</html>
