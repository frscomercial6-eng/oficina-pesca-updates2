[app]
# modo = local  → usa banco SQLite local (padrão para PC único)
# modo = rede   → todos os PCs acessam via servidor central
modo = local
whatsapp_admin = 551123030407

# URL do servidor central (usado quando modo=rede)
# Exemplo: http://192.168.1.100:8000
servidor_url = http://localhost:8000
# URL publica opcional para compartilhar APP CELULAR fora da rede local.
# Exemplo: https://seu-dominio.com/app ou https://xxxx.ngrok-free.app/app
url_app_celular_publica = https://oficina-pesca-updates2-4.onrender.com/app

[versao]
# URL para verificação de nova versão disponível.
# Aponte para o endpoint /api/versao do seu servidor.
# Deixe em branco para desativar a notificação.
# Exemplo: http://192.168.1.100:8000/api/versao
url_check = https://raw.githubusercontent.com/frscomercial6-eng/oficina-pesca-updates/refs/heads/main/versao.json
# URL do JSON de licenças ativas (ex.: arquivo RAW no GitHub).
# Formato: {"licencas": {"<sha256_da_chave>": {"status": "ativo", "tipo": "PERMANENTE|MENSAL|TRIMESTRAL"}}}
url_check_licencas = https://raw.githubusercontent.com/frscomercial6-eng/oficina-pesca-updates/refs/heads/main/licencas.json
# Verificação de atualização a cada X dias.
intervalo_dias_check = 15

[servidor]
# Configurações usadas pelo servidor (servidor.py)
host = 0.0.0.0
porta = 8000

[cloud_backup]
# E-mail do cliente para organização das cópias na nuvem.
# Este valor também pode ser preenchido durante a instalação.
email_cliente =
habilitado = 1
auto_sync = 1
sync_interval_seg = 60
api_key =

[pagamento]
# Link de pagamento (opcional) criado no app da InfinitePay.
# Se preenchido, o sistema oferece abrir o link automaticamente nas cobranças.
infinitepay_link = https://checkout.infinitepay.io/frsoficinadepesca/1Gn63f70Ch
# Links dedicados por item (recomendado).
infinitepay_link_permanente = https://checkout.infinitepay.io/frsoficinadepesca/7cluDoSeuD
infinitepay_link_mensal = https://checkout.infinitepay.io/frsoficinadepesca/HVcxpNKKR
infinitepay_link_trimestral = https://checkout.infinitepay.io/frsoficinadepesca/6IortU0ld
infinitepay_link_atualizacao = https://checkout.infinitepay.io/frsoficinadepesca/qWlxMpjDx
# Promoção de lançamento (opcional)
promo_lancamento_ativo = 1
promo_lancamento_nome = Oferta Lançamento - 2 meses
promo_lancamento_valor = 99.90
infinitepay_link_promo_lancamento = https://checkout.infinitepay.io/frsoficinadepesca/7O04uAqkj
# Handle público da conta (usado no payload handle+items).
infinitepay_handle = frsoficinadepesca
# Endpoint para geração de checkout na API da InfinitePay.
infinitepay_checkout_url = https://api.infinitepay.io/invoices/public/checkout/links
# Token da API (opcional). Se preenchido, o sistema tenta criar link dinâmico.
infinitepay_api_token =
