services:
  - type: web
    name: oficina-pesca-api
    env: python
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn servidor:app --host 0.0.0.0 --port $PORT
    autoDeploy: true
    envVars:
      - key: OFP_JWT_SECRET
        generateValue: true
