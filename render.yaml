services:
  - type: web
    name: oficina-pesca-api
    runtime: python
    buildCommand: python -m pip install --upgrade pip==24.0 setuptools wheel && python -m pip install -r requirements.txt
    startCommand: python -m uvicorn servidor:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: OFP_JWT_SECRET
        generateValue: true
      - key: PYTHON_VERSION
        value: 3.10.12
      - key: OFP_LICENCA_SECRET
        value: OFP-2026-PRIVATE-SECRET